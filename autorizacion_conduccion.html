  <main>
    <h2>Autorización para Circular</h2>

    <form id="form-autorizacion">
      <h3>Información General</h3>
      <label>Días válidos: <input type="text" id="dias_validos" /></label>
      <label>Lugar y Fecha: <input type="text" id="lugar_fecha" /></label>
      <label>Autorizado/a (nombre completo): <input type="text" id="autorizado" /></label>
      <label>Titular del vehículo: <input type="text" id="titular" /></label>

      <h3>Datos del Vehículo</h3>
      <label>Marca: <input type="text" id="marca" /></label>
      <label>Modelo: <input type="text" id="modelo" /></label>
      <label>Tipo: <input type="text" id="tipo" /></label>
      <label>Año: <input type="text" id="anio" /></label>
      <label>Motor N°: <input type="text" id="motor" /></label>
      <label>Chasis N°: <input type="text" id="chasis" /></label>
      <label>Dominio N°: <input type="text" id="dominio" /></label>
      <label>Ubicación/Domicilio: <input type="text" id="domicilio_auto" /></label>

      <label>Otras características: <input type="text" id="otras_caracteristicas" /></label>

      <h3>Propietario Actual</h3>
      <label>Nombre y Apellido: <input type="text" id="propietario_nombre" /></label>
      <label>DNI: <input type="text" id="propietario_dni" /></label>
      <label>Domicilio: <input type="text" id="propietario_domicilio" /></label>
      <label>Localidad: <input type="text" id="propietario_localidad" /></label>


      <button type="button" onclick="generarAutorizacionPDF()">Generar PDF</button>
    </form>
  </main>
